<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#050508}
  canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* Generátor video scén Synthetix — deterministický a periodický
   (perioda PERIOD ms => bezešvá smyčka). Scény: hero | avatar |
   work1 (síť datových uzlů) | work2 (vlnící se linie) | work3 (pulzující mřížka).
   ?step=1 → snímky řídí externí skript přes window.renderAt(ms). */
const params = new URLSearchParams(location.search);
const MODE = params.get('mode') || 'hero';
const PERIOD = 10000;
const TAU = Math.PI * 2;

const c = document.getElementById('c');
const ctx = c.getContext('2d');
function fit(){ c.width = innerWidth; c.height = innerHeight; }
fit(); addEventListener('resize', fit);

/* deterministický pseudonáhodný generátor */
function mulberry(seed){
  return function(){
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

/* zrnitost */
const grain = (() => {
  const g = document.createElement('canvas');
  g.width = 160; g.height = 160;
  const gx = g.getContext('2d');
  const im = gx.createImageData(160,160);
  let s = 12345;
  for (let i=0;i<im.data.length;i+=4){
    s = (s*1103515245 + 12345) & 0x7fffffff;
    im.data[i]=im.data[i+1]=im.data[i+2]=(s%255); im.data[i+3]=9;
  }
  gx.putImageData(im,0,0);
  return g;
})();
function addGrain(w,h){
  ctx.save(); ctx.globalAlpha = .5;
  for (let y=0;y<h;y+=160) for (let x=0;x<w;x+=160) ctx.drawImage(grain,x,y);
  ctx.restore();
}
function vignette(w,h,a){
  const v = ctx.createRadialGradient(w/2,h*.45,0,w/2,h*.45,Math.max(w,h)*.8);
  v.addColorStop(0,'rgba(0,0,0,0)'); v.addColorStop(1,'rgba(0,0,0,'+a+')');
  ctx.fillStyle = v; ctx.fillRect(0,0,w,h);
}
function blob(x,y,rad,rgb,a){
  const g = ctx.createRadialGradient(x,y,0,x,y,rad);
  g.addColorStop(0,'rgba('+rgb[0]+','+rgb[1]+','+rgb[2]+','+a+')');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0,0,c.width,c.height);
}

/* ---------- HERO: tmavý kouř + světelné pruhy ---------- */
function hero(t,w,h){
  ctx.fillStyle = '#050508'; ctx.fillRect(0,0,w,h);
  ctx.globalCompositeOperation = 'lighter';
  const B = [
    {c:[64,78,132], x:.24,y:.22, ox:.10,oy:.07, r:.62, p:0,   fx:1,fy:1, a:.62},
    {c:[52,38,92],  x:.78,y:.30, ox:.08,oy:.10, r:.55, p:2.1, fx:1,fy:2, a:.55},
    {c:[22,62,74],  x:.55,y:.82, ox:.12,oy:.06, r:.60, p:4.2, fx:2,fy:1, a:.50},
    {c:[90,104,170],x:.38,y:.48, ox:.14,oy:.09, r:.38, p:1.3, fx:1,fy:1, a:.38},
    {c:[70,48,110], x:.66,y:.60, ox:.09,oy:.12, r:.42, p:5.0, fx:2,fy:2, a:.36},
  ];
  for (const b of B){
    blob((b.x+Math.cos(t*b.fx+b.p)*b.ox)*w, (b.y+Math.sin(t*b.fy+b.p)*b.oy)*h,
         b.r*Math.max(w,h)*(1+.06*Math.sin(t+b.p)), b.c, b.a);
  }
  /* jemné diagonální světelné pruhy */
  ctx.save();
  ctx.translate(w/2,h/2); ctx.rotate(-.35);
  for (let k=0;k<3;k++){
    const off = Math.sin(t + k*2.1) * w*.18 + (k-1)*w*.22;
    const g = ctx.createLinearGradient(off-90,0,off+90,0);
    g.addColorStop(0,'rgba(120,140,220,0)');
    g.addColorStop(.5,'rgba(120,140,220,.05)');
    g.addColorStop(1,'rgba(120,140,220,0)');
    ctx.fillStyle = g;
    ctx.fillRect(off-90,-h,180,h*2);
  }
  ctx.restore();
  ctx.globalCompositeOperation = 'source-over';
  vignette(w,h,.55); addGrain(w,h);
}

/* ---------- AVATAR: pulzující orb ---------- */
function avatar(t,w,h){
  ctx.fillStyle = '#0a0912'; ctx.fillRect(0,0,w,h);
  ctx.globalCompositeOperation = 'lighter';
  blob((.42+Math.cos(t)*.10)*w, (.36+Math.sin(t)*.08)*h, .72*w*(1+.05*Math.sin(t)), [120,130,200], .85);
  blob((.62+Math.cos(t*1+2.6)*.09)*w, (.62+Math.sin(t*2+2.6)*.10)*h, .65*w, [70,50,120], .7);
  blob((.35+Math.cos(t*2+4.4)*.08)*w, (.72+Math.sin(t+4.4)*.07)*h, .55*w, [30,70,90], .6);
  /* orb */
  const ox = w*.5, oy = h*.52, orr = w*.23*(1+.05*Math.sin(t*2));
  const og = ctx.createRadialGradient(ox-orr*.3,oy-orr*.3,orr*.1,ox,oy,orr);
  og.addColorStop(0,'rgba(240,242,255,.95)');
  og.addColorStop(.55,'rgba(150,160,230,.5)');
  og.addColorStop(1,'rgba(80,90,170,0)');
  ctx.fillStyle = og; ctx.beginPath(); ctx.arc(ox,oy,orr,0,TAU); ctx.fill();
  ctx.globalCompositeOperation = 'source-over';
  vignette(w,h,.4); addGrain(w,h);
}

/* ---------- WORK 1: síť datových uzlů (modrá) ---------- */
function work1(t,w,h){
  ctx.fillStyle = '#070b14'; ctx.fillRect(0,0,w,h);
  ctx.globalCompositeOperation = 'lighter';
  blob(w*.3,h*.25,w*.7,[27,42,74],.8);
  blob(w*.75,h*.8,w*.6,[16,28,58],.7);
  const rnd = mulberry(7);
  const N = 26; const pts = [];
  for (let i=0;i<N;i++){
    const bx = rnd()*w, by = rnd()*h, ph = rnd()*TAU, amp = 14+rnd()*22, f = rnd()<.5?1:2;
    pts.push({ x: bx + Math.cos(t*f+ph)*amp, y: by + Math.sin(t*f+ph*1.7)*amp, ph });
  }
  ctx.lineWidth = 1;
  for (let i=0;i<N;i++) for (let j=i+1;j<N;j++){
    const dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y;
    const d2 = dx*dx+dy*dy, max = (w*.16)*(w*.16);
    if (d2 < max){
      const a = (1-d2/max)*.28;
      ctx.strokeStyle = 'rgba(120,160,255,'+a+')';
      ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke();
    }
  }
  for (const p of pts){
    const tw = .5+.5*Math.sin(t*2+p.ph*3);
    ctx.fillStyle = 'rgba(170,200,255,'+(.35+.55*tw)+')';
    ctx.beginPath(); ctx.arc(p.x,p.y,1.6+1.6*tw,0,TAU); ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
  vignette(w,h,.5); addGrain(w,h);
}

/* ---------- WORK 2: vlnící se linie (fialová) ---------- */
function work2(t,w,h){
  ctx.fillStyle = '#0d0916'; ctx.fillRect(0,0,w,h);
  ctx.globalCompositeOperation = 'lighter';
  blob(w*.7,h*.25,w*.65,[42,30,70],.85);
  blob(w*.2,h*.75,w*.6,[30,18,52],.75);
  for (let k=0;k<9;k++){
    const yBase = h*(.12+k*.095);
    const amp = 16 + k*4;
    const g = ctx.createLinearGradient(0,0,w,0);
    g.addColorStop(0,'rgba(170,130,255,0)');
    g.addColorStop(.5,'rgba(170,130,255,'+(.10+.05*Math.sin(t+k))+')');
    g.addColorStop(1,'rgba(170,130,255,0)');
    ctx.strokeStyle = g; ctx.lineWidth = 1.4;
    ctx.beginPath();
    for (let x=0;x<=w;x+=12){
      const y = yBase + Math.sin(x/w*TAU*2 + t*(k%2?1:2) + k*.8)*amp
                      + Math.sin(x/w*TAU + t + k)*amp*.4;
      x===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  ctx.globalCompositeOperation = 'source-over';
  vignette(w,h,.5); addGrain(w,h);
}

/* ---------- WORK 3: pulzující mřížka (teal) ---------- */
function work3(t,w,h){
  ctx.fillStyle = '#07141a'; ctx.fillRect(0,0,w,h);
  ctx.globalCompositeOperation = 'lighter';
  blob(w*.5,h*.3,w*.7,[18,51,52],.85);
  blob(w*.8,h*.85,w*.5,[10,36,42],.7);
  const step = Math.max(44, w/22);
  for (let gy=step/2; gy<h; gy+=step){
    for (let gx=step/2; gx<w; gx+=step){
      const wave = Math.sin(t*2 + (gx+gy)/(w*.25));
      const a = .10 + .22*(0.5+0.5*wave);
      const r = 1.2 + 2.2*(0.5+0.5*wave);
      ctx.fillStyle = 'rgba(120,220,210,'+a+')';
      ctx.beginPath(); ctx.arc(gx,gy,r,0,TAU); ctx.fill();
      if (wave > .55){
        ctx.strokeStyle = 'rgba(120,220,210,'+((wave-.55)*.35)+')';
        ctx.lineWidth = 1;
        ctx.strokeRect(gx-step/2,gy-step/2,step,step);
      }
    }
  }
  ctx.globalCompositeOperation = 'source-over';
  vignette(w,h,.5); addGrain(w,h);
}

const SCENES = { hero: hero, avatar: avatar, work1: work1, work2: work2, work3: work3 };

function renderAt(ms){
  const t = ((ms % PERIOD) / PERIOD) * TAU;
  (SCENES[MODE] || hero)(t, c.width, c.height);
}
window.renderAt = renderAt;
window.getFramePng = () => c.toDataURL('image/png').split(',')[1];

if (!params.get('step')) {
  (function loop(now){ renderAt(now); requestAnimationFrame(loop); })(0);
}
</script>
</body>
</html>
